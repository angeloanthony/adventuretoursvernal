<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BW Promo Badge Preview — Adventure Tours Vernal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --sandstone: #E8D5C4;
  --warm-tan: #D4B896;
  --sky-blue: #A8CDEC;
  --sage-green: #B8C5A8;
  --burnt-orange: #D4764E;
  --rust-red: #B85C3E;
  --charcoal: #3A3A3A;
  --off-white: #FAF8F5;
  --light-sand: #F5EDE3;
  --desert-gold: #DAA520;
  --canyon-red: #C1440E;
  --font-heading: 'Montserrat', sans-serif;
  --font-body: 'Open Sans', sans-serif;
  --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font-body);
  background: linear-gradient(135deg, #87CEEB 0%, #F4A460 50%, #D2691E 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.context-label {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 12px 24px;
  border-radius: 30px;
  font-family: var(--font-heading);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 1px;
  z-index: 9999;
  backdrop-filter: blur(10px);
}

/* Simulated mobile sticky CTA */
.fake-sticky-cta {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--burnt-orange);
  padding: 15px 20px;
  z-index: 999;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
  display: none;
  text-align: center;
  color: white;
  font-family: var(--font-heading);
  font-weight: 700;
}

@media (max-width: 768px) {
  .fake-sticky-cta { display: block; }
}

/* ===== BADGE STYLES (identical to bw-promo-badge.css) ===== */
.bw-promo-badge {
  position: fixed;
  bottom: 30px;
  left: 20px;
  z-index: 997;
  width: 280px;
  text-decoration: none;
  display: block;
  animation: badgeSlideIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) 0.5s both;
}

.bw-promo-badge::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--burnt-orange), var(--desert-gold), var(--burnt-orange));
  background-size: 200% 200%;
  animation: badgeGlow 2.5s ease-in-out infinite;
  z-index: -1;
  opacity: 0.7;
  filter: blur(8px);
}

.bw-promo-badge-inner {
  background: linear-gradient(135deg, #1a3c5e 0%, #0d2b45 60%, #1a3c5e 100%);
  border-radius: 18px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
  border: 2px solid rgba(218,165,32,0.4);
}

.bw-promo-badge-inner::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(218,165,32,0.15), transparent);
  animation: badgeShimmer 4s ease-in-out infinite 1.5s;
  pointer-events: none;
}

.bw-promo-badge-inner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--desert-gold), var(--burnt-orange), var(--desert-gold));
}

.bw-badge-eyebrow {
  font-family: var(--font-heading);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--desert-gold);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.bw-badge-eyebrow .pulse-dot {
  width: 8px;
  height: 8px;
  background: #27AE60;
  border-radius: 50%;
  animation: dotPulse 1.5s ease-in-out infinite;
  flex-shrink: 0;
}

.bw-badge-offer {
  font-family: var(--font-heading);
  font-size: 1.5rem;
  font-weight: 800;
  color: white;
  line-height: 1.15;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.bw-badge-offer .highlight {
  background: linear-gradient(135deg, var(--desert-gold), #f0c040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.bw-badge-detail {
  font-family: var(--font-body);
  font-size: 0.82rem;
  color: rgba(255,255,255,0.8);
  line-height: 1.5;
  margin-bottom: 12px;
}

.bw-badge-detail strong { color: white; }

.bw-badge-cta-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.bw-badge-button {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: linear-gradient(135deg, var(--burnt-orange), var(--rust-red));
  color: white;
  padding: 9px 18px;
  border-radius: 25px;
  font-family: var(--font-heading);
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  transition: all 0.3s ease;
  box-shadow: 0 4px 15px rgba(212,118,78,0.4);
}

.bw-promo-badge:hover .bw-badge-button {
  background: linear-gradient(135deg, var(--rust-red), var(--canyon-red));
  transform: translateX(3px);
  box-shadow: 0 6px 20px rgba(212,118,78,0.5);
}

.bw-badge-logo-text {
  font-family: var(--font-heading);
  font-size: 0.65rem;
  font-weight: 700;
  color: rgba(255,255,255,0.5);
  letter-spacing: 0.5px;
}

.bw-badge-close {
  position: absolute;
  top: 8px;
  right: 10px;
  background: rgba(255,255,255,0.1);
  border: none;
  color: rgba(255,255,255,0.5);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  z-index: 10;
  padding: 0;
}

.bw-badge-close:hover {
  background: rgba(255,255,255,0.2);
  color: white;
  transform: rotate(90deg);
}

.bw-promo-badge:hover .bw-promo-badge-inner {
  box-shadow: 0 15px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.15);
  border-color: rgba(218,165,32,0.6);
}

.bw-promo-badge:hover {
  transform: translateY(-3px);
  transition: transform 0.3s ease;
}

@keyframes badgeSlideIn {
  from { opacity:0; transform:translateY(40px) scale(0.9); }
  to { opacity:1; transform:translateY(0) scale(1); }
}

@keyframes badgeGlow {
  0%,100% { opacity:0.5; background-position:0% 50%; }
  50% { opacity:0.85; background-position:100% 50%; }
}

@keyframes badgeShimmer {
  0% { left:-100%; }
  40% { left:150%; }
  100% { left:150%; }
}

@keyframes dotPulse {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.7); }
}

.bw-promo-badge.dismissed {
  opacity:0;
  transform:translateY(30px) scale(0.9);
  pointer-events:none;
  transition:all 0.4s ease;
}

@media (max-width:1024px) {
  .bw-promo-badge { width:260px; bottom:25px; left:15px; }
  .bw-badge-offer { font-size:1.35rem; }
}

@media (max-width:768px) {
  .bw-promo-badge {
    bottom:80px;
    left:10px;
    right:10px;
    width:auto;
    max-width:340px;
  }
  .bw-promo-badge-inner {
    padding:16px 18px;
    display:flex;
    gap:14px;
    align-items:center;
  }
  .bw-badge-text-wrap { flex:1; min-width:0; }
  .bw-badge-offer { font-size:1.15rem; margin-bottom:4px; }
  .bw-badge-detail { font-size:0.78rem; margin-bottom:0; }
  .bw-badge-cta-row { display:none; }
  .bw-badge-eyebrow { font-size:0.6rem; margin-bottom:4px; }
}

@media (max-width:480px) {
  .bw-promo-badge { bottom:75px; left:8px; right:8px; }
  .bw-promo-badge-inner { padding:14px 16px; }
  .bw-badge-offer { font-size:1.05rem; }
}
</style>
</head>
<body>

<div class="context-label">Best Western Promo Badge Preview</div>

<!-- Simulated mobile sticky CTA -->
<div class="fake-sticky-cta">Book Your Ride Now</div>

<!-- THE BADGE -->
<a href="https://bestwesternvernal.com" target="_blank" rel="noopener" class="bw-promo-badge" id="bwPromoBadge">
  <div class="bw-promo-badge-inner">
    <button class="bw-badge-close" onclick="event.preventDefault();event.stopPropagation();dismissBwBadge();" aria-label="Close promo">&times;</button>
    <div class="bw-badge-text-wrap">
      <div class="bw-badge-eyebrow">
        <span class="pulse-dot"></span>
        Stay &amp; Ride Deal
      </div>
      <div class="bw-badge-offer">
        <span class="highlight">10% Off</span> Lodging
      </div>
      <p class="bw-badge-detail">
        Book at <strong>Best Western Vernal</strong> &mdash; mention <strong>&ldquo;Adventure Tours&rdquo;</strong> when you call.
      </p>
      <div class="bw-badge-cta-row">
        <span class="bw-badge-button">Book Lodging &rarr;</span>
        <span class="bw-badge-logo-text">bestwesternvernal.com</span>
      </div>
    </div>
  </div>
</a>

<script>
function dismissBwBadge() {
  var badge = document.getElementById('bwPromoBadge');
  if (badge) badge.classList.add('dismissed');
}
</script>
</body>
</html>
